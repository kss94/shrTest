name: 배포 테스트

on:
  workflow_dispatch:
  pull_request:
    branches:
      - 'main'

  push:
    branches:
      - 'main'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x'

    - name: Build
      run: dotnet build shrTest.slnx -c Release

    - name: Test
      run: dotnet test shrTest.slnx -c Release --logger "trx;LogFileName=test-results.trx"

    - name: Publish Test Results
      uses: dorny/test-reporter@v3
      with:
        name: Unit Tests
        path: '**/TestResults/*.trx'
        reporter: dotnet-trx
        fail-on-error: true

    - name: Publish
      run: dotnet publish shrTest.slnx -c Release

    - name: Deploy via SCP
      uses: appleboy/scp-action@v1
      with:
        host: 210.223.37.59
        username: tsupport
        password: VMFfotvha5(Roqkf
        source: "./publish/*"
        target: "D:/test/"